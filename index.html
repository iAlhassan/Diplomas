<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دبلومات معهد جازان العالي للتدريب</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #004d88;
            --light-blue: #009edf;
            --orange: #e97125;
            --text-color: #2c3e50;
            --white-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Tajawal', Tahoma, Geneva, sans-serif;
            background: linear-gradient(135deg, #f0f7ff 0%, #e1f0fa 50%, #fff3ec 100%);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.8;
            min-height: 100vh;
        }

        header {
            background-color: var(--white-bg);
            box-shadow: 0 4px 15px rgba(0, 77, 136, 0.08);
            text-align: center;
            padding: 20px 0;
            border-bottom: 4px solid var(--orange);
            position: relative;
            z-index: 100;
        }

        header img {
            max-width: 280px;
            width: 80%;
            height: auto;
        }

        .container {
            max-width: 1050px;
            margin: 30px auto;
            padding: 30px 20px;
            background-color: var(--white-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .selection-area {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 2px dashed rgba(0, 158, 223, 0.2);
            position: relative;
            z-index: 50; /* Ensure it's clickable */
        }

        .selection-area label {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--primary-blue);
            margin-bottom: 15px;
            display: block;
        }

        /* STYLES FOR THE SELECT - Keeping it basic and native for mobile to avoid bugs */
        select#diplomaSelect {
            width: 100%;
            max-width: 500px;
            height: 60px;
            padding: 0 15px;
            font-size: 1.2rem;
            font-family: 'Tajawal', sans-serif;
            border: 2px solid var(--light-blue);
            border-radius: 12px;
            background-color: #ffffff;
            color: var(--primary-blue);
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 158, 223, 0.1);

            /* Enable native appearance to guarantee mobile functionality */
            -webkit-appearance: menulist;
            -moz-appearance: menulist;
            appearance: menulist;
        }

        select#diplomaSelect:focus {
            border-color: var(--orange);
            outline: none;
        }

        .details-section {
            display: none;
            animation: slideUp 0.5s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2#diplomaTitle {
            color: var(--primary-blue);
            font-size: 2rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 25px;
            position: relative;
            padding-bottom: 15px;
        }

        h2#diplomaTitle::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background-color: var(--orange);
            border-radius: 2px;
        }

        .info-card {
            background: #ffffff;
            border-right: 5px solid var(--light-blue);
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        .info-card h3 {
            color: var(--primary-blue);
            font-size: 1.3rem;
            margin-top: 0;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-card h3::before {
            content: '📌';
            color: var(--orange);
        }

        .info-card p {
            text-align: justify;
            font-size: 1.1rem;
            color: #4a5568;
            margin: 0;
        }

        ul.objectives-list {
            list-style-type: none;
            padding-right: 0;
            margin: 0;
        }

        ul.objectives-list li {
            position: relative;
            padding-right: 30px;
            font-size: 1.1rem;
            color: #4a5568;
            background: #fdfdfd;
            padding: 10px 30px 10px 10px;
            border-radius: 8px;
            border: 1px solid #eef2f7;
            margin-bottom: 10px;
        }

        ul.objectives-list li::before {
            content: "✓";
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            background-color: var(--orange);
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .section-title {
            color: var(--primary-blue);
            font-size: 1.6rem;
            margin: 30px 0 20px;
            text-align: right;
            border-bottom: 2px solid var(--light-blue);
            padding-bottom: 10px;
        }

        .levels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .level-card {
            background-color: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .level-header {
            background: linear-gradient(135deg, var(--primary-blue), var(--light-blue));
            color: white;
            padding: 12px 15px;
            font-size: 1.2rem;
            font-weight: 700;
            text-align: center;
        }

        .level-courses {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        .level-courses li {
            padding: 10px 15px;
            border-bottom: 1px solid #f1f5f9;
            color: #4a5568;
            font-size: 1.05rem;
            font-weight: 500;
            display: flex;
            align-items: center;
        }

        .level-courses li:last-child {
            border-bottom: none;
        }

        .level-courses li::before {
            content: "▪";
            color: var(--orange);
            font-size: 1.2rem;
            margin-left: 10px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px 15px;
                margin: 15px;
                border-radius: 12px;
            }

            select#diplomaSelect {
                height: 55px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>

        // Populate the dropdown
        window.onload = function() {
            const selectElement = document.getElementById("diplomaSelect");
            for (let diplomaName in diplomasData) {
                let option = document.createElement("option");
                option.value = diplomaName;
                option.textContent = diplomaName;
                selectElement.appendChild(option);
            }
        };

        // Handle selection change
        function showDiplomaDetails() {
            const selectedDiploma = document.getElementById("diplomaSelect").value;
            const detailsContainer = document.getElementById("detailsContainer");

            if (selectedDiploma === "") {
                detailsContainer.style.display = "none";
                return;
            }

            const info = diplomasData[selectedDiploma];
            const levels = levelsData[selectedDiploma];

            // Fill basic info
            document.getElementById("diplomaTitle").textContent = "دبلوم " + selectedDiploma;
            document.getElementById("diplomaDescription").textContent = info.description;
            document.getElementById("diplomaGeneralObj").textContent = info.generalObjective;

            // Fill specific objectives
            const objectivesList = document.getElementById("diplomaSpecificObjs");
            objectivesList.innerHTML = "";
            info.specificObjectives.forEach(obj => {
                let li = document.createElement("li");
                li.textContent = obj;
                objectivesList.appendChild(li);
            });

            // Fill levels and courses
            const levelsGrid = document.getElementById("levelsGrid");
            levelsGrid.innerHTML = "";

            levels.forEach(levelData => {
                let card = document.createElement("div");
                card.className = "level-card";

                let header = document.createElement("div");
                header.className = "level-header";
                header.textContent = "المستوى " + levelData.level;
                card.appendChild(header);

                let ul = document.createElement("ul");
                ul.className = "level-courses";
                levelData.courses.forEach(course => {
                    let li = document.createElement("li");
                    li.textContent = course;
                    ul.appendChild(li);
                });

                card.appendChild(ul);
                levelsGrid.appendChild(card);
            });

            detailsContainer.style.display = "block";
        }
    </script>
